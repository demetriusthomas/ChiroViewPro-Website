  <path d="M116 56 L116 44 L104 44" fill="none" stroke="url(#goldSheen)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M44 104 L44 116 L56 116" fill="none" stroke="url(#goldSheen)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M116 104 L116 116 L104 116" fill="none" stroke="url(#goldSheen)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Spine vertebra stack -->
  <rect x="68" y="42" width="24" height="8" rx="3" fill="url(#goldSheen)"/>
  <rect x="72" y="51" width="16" height="4" rx="1.5" fill="#C9A84C" opacity="0.5"/>

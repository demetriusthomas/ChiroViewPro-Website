  <rect x="71" y="66" width="18" height="4" rx="1.5" fill="#C9A84C" opacity="0.5"/>
  <rect x="64" y="72" width="32" height="9" rx="3" fill="url(#goldSheenLight)"/>
  <rect x="70" y="82" width="20" height="4" rx="1.5" fill="#C9A84C" opacity="0.5"/>
  <rect x="66" y="88" width="28" height="8" rx="3" fill="url(#goldSheen)"/>
  <rect x="71" y="97" width="18" height="4" rx="1.5" fill="#C9A84C" opacity="0.5"/>
  <rect x="68" y="103" width="24" height="8" rx="3" fill="url(#goldSheen)"/>

  <!-- Spine center line -->
  <line x1="80" y1="42" x2="80" y2="111" stroke="#0F1F3D" stroke-width="3"/>

  <!-- Center dot -->
  <circle cx="80" cy="80" r="4" fill="url(#goldSheenLight)"/>
  <circle cx="80" cy="80" r="2" fill="#0F1F3D"/>
